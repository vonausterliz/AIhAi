<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>NEON PONG</title>
<style>
  :root {
    --neon-cyan: #4dfcff;
    --neon-pink: #ff4dc4;
    --neon-yellow: #fff94d;
    --bg-dark: #050510;
  }
  * { box-sizing: border-box; margin:0; padding:0; }
  body {
    background: radial-gradient(ellipse at center, #10101c 0%, #050508 100%);
    font-family: 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
    min-height: 100vh;
    color: #e8e8f0;
  }
  h1.title {
    font-size: 32px;
    letter-spacing: 10px;
    color: var(--neon-cyan);
    text-shadow: 0 0 8px var(--neon-cyan), 0 0 20px var(--neon-cyan), 0 0 40px rgba(77,252,255,0.4);
    margin-bottom: 4px;
  }
  .subtitle {
    color: #7a7a9a;
    font-size: 12px;
    letter-spacing: 4px;
    margin-bottom: 16px;
  }
  .game-wrap {
    position: relative;
    width: 800px;
    max-width: 100%;
  }
  canvas {
    display: block;
    width: 100%;
    aspect-ratio: 800 / 500;
    background: var(--bg-dark);
    border: 2px solid #2a2a44;
    border-radius: 10px;
    box-shadow: 0 0 40px rgba(77,252,255,0.15), inset 0 0 60px rgba(0,0,0,0.6);
  }
  .overlay {
    position:absolute; inset:0;
    background: rgba(5,5,10,0.92);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; border-radius:10px; padding: 20px; z-index: 10;
    gap: 14px;
  }
  .overlay.hidden { display:none; }
  .overlay h2 {
    color: var(--neon-pink);
    text-shadow: 0 0 8px var(--neon-pink), 0 0 24px rgba(255,77,196,0.5);
    font-size: 24px; letter-spacing: 4px; margin-bottom: 6px;
  }
  .overlay p { color:#b8b8d0; font-size: 13px; max-width: 460px; line-height:1.6; margin-bottom: 6px; }
  .mode-row, .diff-row { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
  .opt-btn {
    background: transparent;
    color: var(--neon-cyan);
    border: 2px solid var(--neon-cyan);
    border-radius: 6px;
    padding: 10px 18px;
    font-family: inherit;
    font-size: 13px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .opt-btn:hover { background: rgba(77,252,255,0.12); box-shadow: 0 0 14px rgba(77,252,255,0.4); }
  .opt-btn.selected {
    background: var(--neon-cyan);
    color: #05050a;
    box-shadow: 0 0 20px rgba(77,252,255,0.7);
  }
  .diff-row .opt-btn { border-color: var(--neon-yellow); color: var(--neon-yellow); }
  .diff-row .opt-btn:hover { background: rgba(255,249,77,0.12); box-shadow: 0 0 14px rgba(255,249,77,0.4); }
  .diff-row .opt-btn.selected { background: var(--neon-yellow); color:#05050a; box-shadow: 0 0 20px rgba(255,249,77,0.7); }
  .big-btn {
    background: var(--neon-pink);
    color: #05050a;
    border: none;
    border-radius: 8px;
    padding: 13px 34px;
    font-size: 15px;
    font-weight: bold;
    letter-spacing: 2px;
    cursor: pointer;
    font-family: inherit;
    box-shadow: 0 0 20px rgba(255,77,196,0.6);
    transition: transform 0.1s;
    margin-top: 6px;
  }
  .big-btn:hover { transform: scale(1.05); }
  .big-btn:disabled { opacity: 0.35; cursor: not-allowed; transform:none; }
  .controls-hint {
    margin-top: 14px;
    color: #6a6a88;
    font-size: 12px;
    letter-spacing: 1px;
    text-align: center;
    line-height: 1.6;
  }
  .controls-hint b { color: #9a9ac0; }
  .pause-hint { position:absolute; top:10px; right:14px; color:#4a4a68; font-size:11px; letter-spacing:1px; }
</style>
</head>
<body>

<h1 class="title">NEON PONG</h1>
<div class="subtitle">— la sfida classica, ricaricata —</div>

<div class="game-wrap">
  <canvas id="canvas" width="800" height="500"></canvas>
  <div class="pause-hint">SPAZIO = pausa</div>

  <div class="overlay" id="startScreen">
    <h2>SCEGLI LA TUA SFIDA</h2>
    <p>Primo a 7 punti vince. Muovi la racchetta per intercettare la pallina: più la colpisci ai bordi, più l'angolo si fa imprevedibile.</p>

    <div class="mode-row" id="modeRow">
      <button class="opt-btn selected" data-mode="cpu" onclick="selectMode('cpu')">1 GIOCATORE (vs CPU)</button>
      <button class="opt-btn" data-mode="2p" onclick="selectMode('2p')">2 GIOCATORI</button>
    </div>

    <div class="diff-row" id="diffRow">
      <button class="opt-btn" data-diff="easy" onclick="selectDiff('easy')">FACILE</button>
      <button class="opt-btn selected" data-diff="normal" onclick="selectDiff('normal')">NORMALE</button>
      <button class="opt-btn" data-diff="hard" onclick="selectDiff('hard')">DIFFICILE</button>
    </div>

    <button class="big-btn" onclick="startGame()">▶ GIOCA</button>
  </div>

  <div class="overlay hidden" id="winScreen">
    <h2 id="winTitle">VITTORIA!</h2>
    <p id="winText"></p>
    <button class="big-btn" onclick="backToMenu()">MENU</button>
  </div>

  <div class="overlay hidden" id="pauseScreen">
    <h2>PAUSA</h2>
    <button class="big-btn" onclick="togglePause()">▶ RIPRENDI</button>
  </div>
</div>

<div class="controls-hint" id="controlsHint">
  Giocatore sinistro: <b>W</b> / <b>S</b> &nbsp;&nbsp;|&nbsp;&nbsp; Giocatore destro: <b>↑</b> / <b>↓</b>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const COLORS = { cyan: '#4dfcff', pink: '#ff4dc4', yellow: '#fff94d', white: '#e8e8f0' };

let mode = 'cpu';
let difficulty = 'normal';
let running = false;
let paused = false;

const PADDLE_W = 14, PADDLE_H = 90, PADDLE_SPEED = 7;
const WIN_SCORE = 7;

let leftPaddle, rightPaddle, ball, keys, scoreLeft, scoreRight, trail;

function resetEntities(){
  leftPaddle = { x: 24, y: H/2 - PADDLE_H/2, w: PADDLE_W, h: PADDLE_H, dy: 0 };
  rightPaddle = { x: W - 24 - PADDLE_W, y: H/2 - PADDLE_H/2, w: PADDLE_W, h: PADDLE_H, dy: 0 };
  scoreLeft = 0; scoreRight = 0;
  keys = {};
  trail = [];
  resetBall(Math.random() < 0.5 ? -1 : 1);
}

function resetBall(direction){
  const speed = 5.2;
  const angle = (Math.random() * 0.6 - 0.3); // radians spread
  ball = {
    x: W/2, y: H/2, r: 8,
    vx: Math.cos(angle) * speed * direction,
    vy: Math.sin(angle) * speed * 3.2,
    speed: speed
  };
  trail = [];
}

/* ---- Audio (simple beeps, no external files) ---- */
let audioCtx = null;
function beep(freq, duration, vol){
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.value = freq;
    gain.gain.value = vol;
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.stop(audioCtx.currentTime + duration);
  } catch(e){ /* audio not available, ignore */ }
}
function sfxHit(){ beep(220, 0.08, 0.06); }
function sfxWall(){ beep(140, 0.06, 0.05); }
function sfxScore(){ beep(90, 0.35, 0.08); }

/* ---- Mode / Difficulty selection ---- */
function selectMode(m){
  mode = m;
  document.querySelectorAll('#modeRow .opt-btn').forEach(b => b.classList.toggle('selected', b.dataset.mode === m));
  document.getElementById('diffRow').style.display = (m === 'cpu') ? 'flex' : 'none';
  document.getElementById('controlsHint').innerHTML = (m === 'cpu')
    ? 'Muovi la racchetta con <b>W</b> / <b>S</b> oppure <b>↑</b> / <b>↓</b>'
    : 'Giocatore sinistro: <b>W</b> / <b>S</b> &nbsp;&nbsp;|&nbsp;&nbsp; Giocatore destro: <b>↑</b> / <b>↓</b>';
}
function selectDiff(d){
  difficulty = d;
  document.querySelectorAll('#diffRow .opt-btn').forEach(b => b.classList.toggle('selected', b.dataset.diff === d));
}

function startGame(){
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('winScreen').classList.add('hidden');
  resetEntities();
  running = true;
  paused = false;
  requestAnimationFrame(loop);
}

function backToMenu(){
  running = false;
  document.getElementById('winScreen').classList.add('hidden');
  document.getElementById('startScreen').classList.remove('hidden');
}

function togglePause(){
  if(!running) return;
  paused = !paused;
  document.getElementById('pauseScreen').classList.toggle('hidden', !paused);
}

/* ---- Input ---- */
document.addEventListener('keydown', (e) => {
  keys[e.key] = true;
  if(e.key === ' '){ e.preventDefault(); togglePause(); }
});
document.addEventListener('keyup', (e) => { keys[e.key] = false; });

/* ---- Game loop ---- */
function loop(){
  if(!running) return;
  if(!paused){
    update();
    draw();
  }
  requestAnimationFrame(loop);
}

function update(){
  // left paddle: W/S always player-controlled
  if(keys['w'] || keys['W']) leftPaddle.y -= PADDLE_SPEED;
  if(keys['s'] || keys['S']) leftPaddle.y += PADDLE_SPEED;

  if(mode === '2p'){
    if(keys['ArrowUp']) rightPaddle.y -= PADDLE_SPEED;
    if(keys['ArrowDown']) rightPaddle.y += PADDLE_SPEED;
  } else {
    // also allow arrow keys to control left paddle in 1P mode for comfort
    if(keys['ArrowUp']) leftPaddle.y -= PADDLE_SPEED;
    if(keys['ArrowDown']) leftPaddle.y += PADDLE_SPEED;
    aiMove();
  }

  leftPaddle.y = Math.max(0, Math.min(H - leftPaddle.h, leftPaddle.y));
  rightPaddle.y = Math.max(0, Math.min(H - rightPaddle.h, rightPaddle.y));

  // trail
  trail.push({x: ball.x, y: ball.y});
  if(trail.length > 10) trail.shift();

  ball.x += ball.vx;
  ball.y += ball.vy;

  // top/bottom bounce
  if(ball.y - ball.r < 0){ ball.y = ball.r; ball.vy *= -1; sfxWall(); }
  if(ball.y + ball.r > H){ ball.y = H - ball.r; ball.vy *= -1; sfxWall(); }

  // paddle collisions
  if(ball.vx < 0 && ball.x - ball.r < leftPaddle.x + leftPaddle.w && ball.x - ball.r > leftPaddle.x - 10
     && ball.y > leftPaddle.y && ball.y < leftPaddle.y + leftPaddle.h){
    bounceOffPaddle(leftPaddle, 1);
  }
  if(ball.vx > 0 && ball.x + ball.r > rightPaddle.x && ball.x + ball.r < rightPaddle.x + rightPaddle.w + 10
     && ball.y > rightPaddle.y && ball.y < rightPaddle.y + rightPaddle.h){
    bounceOffPaddle(rightPaddle, -1);
  }

  // scoring
  if(ball.x < -30){
    scoreRight++;
    sfxScore();
    checkWin();
    if(running) resetBall(1);
  } else if(ball.x > W + 30){
    scoreLeft++;
    sfxScore();
    checkWin();
    if(running) resetBall(-1);
  }
}

function bounceOffPaddle(paddle, dir){
  const relative = (ball.y - (paddle.y + paddle.h/2)) / (paddle.h/2); // -1..1
  const bounceAngle = relative * (Math.PI/3); // max 60deg
  ball.speed = Math.min(ball.speed + 0.4, 13);
  ball.vx = Math.cos(bounceAngle) * ball.speed * dir;
  ball.vy = Math.sin(bounceAngle) * ball.speed;
  ball.x = dir === 1 ? paddle.x + paddle.w + ball.r : paddle.x - ball.r;
  sfxHit();
}

function aiMove(){
  const diffSettings = {
    easy:   { speed: 4.2, error: 55, reaction: 0.05 },
    normal: { speed: 5.6, error: 28, reaction: 0.10 },
    hard:   { speed: 7.2, error: 8,  reaction: 0.18 }
  };
  const s = diffSettings[difficulty];
  const paddleCenter = rightPaddle.y + rightPaddle.h/2;

  // predicted target with some jitter based on difficulty error margin
  if(!rightPaddle._target || Math.random() < s.reaction){
    rightPaddle._target = ball.y + (Math.random() * 2 - 1) * s.error;
  }
  const target = rightPaddle._target;

  if(paddleCenter < target - 6) rightPaddle.y += s.speed;
  else if(paddleCenter > target + 6) rightPaddle.y -= s.speed;
}

function checkWin(){
  if(scoreLeft >= WIN_SCORE || scoreRight >= WIN_SCORE){
    running = false;
    const leftWon = scoreLeft >= WIN_SCORE;
    document.getElementById('winTitle').textContent = (mode === 'cpu')
      ? (leftWon ? 'HAI VINTO!' : 'HA VINTO LA CPU')
      : (leftWon ? 'VINCE IL GIOCATORE SINISTRO' : 'VINCE IL GIOCATORE DESTRO');
    document.getElementById('winText').textContent = `Punteggio finale: ${scoreLeft} - ${scoreRight}`;
    document.getElementById('winScreen').classList.remove('hidden');
  }
}

/* ---- Rendering ---- */
function draw(){
  ctx.clearRect(0, 0, W, H);

  // background subtle grid
  ctx.strokeStyle = 'rgba(77,252,255,0.05)';
  ctx.lineWidth = 1;
  for(let gx = 0; gx < W; gx += 40){
    ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, H); ctx.stroke();
  }
  for(let gy = 0; gy < H; gy += 40){
    ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke();
  }

  // center dashed line
  ctx.strokeStyle = 'rgba(232,232,240,0.25)';
  ctx.lineWidth = 3;
  ctx.setLineDash([12, 14]);
  ctx.beginPath(); ctx.moveTo(W/2, 0); ctx.lineTo(W/2, H); ctx.stroke();
  ctx.setLineDash([]);

  // scores
  ctx.font = 'bold 48px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = COLORS.cyan;
  ctx.shadowColor = COLORS.cyan; ctx.shadowBlur = 14;
  ctx.fillText(scoreLeft, W/2 - 70, 60);
  ctx.fillStyle = COLORS.pink;
  ctx.shadowColor = COLORS.pink;
  ctx.fillText(scoreRight, W/2 + 70, 60);
  ctx.shadowBlur = 0;

  // ball trail
  trail.forEach((t, i) => {
    const alpha = (i / trail.length) * 0.35;
    ctx.beginPath();
    ctx.arc(t.x, t.y, ball.r * (i/trail.length), 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,249,77,${alpha})`;
    ctx.fill();
  });

  // paddles
  drawPaddle(leftPaddle, COLORS.cyan);
  drawPaddle(rightPaddle, COLORS.pink);

  // ball
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
  ctx.fillStyle = COLORS.yellow;
  ctx.shadowColor = COLORS.yellow; ctx.shadowBlur = 18;
  ctx.fill();
  ctx.shadowBlur = 0;
}

function drawPaddle(p, color){
  ctx.fillStyle = color;
  ctx.shadowColor = color;
  ctx.shadowBlur = 16;
  ctx.beginPath();
  ctx.roundRect ? ctx.roundRect(p.x, p.y, p.w, p.h, 4) : ctx.rect(p.x, p.y, p.w, p.h);
  ctx.fill();
  ctx.shadowBlur = 0;
}

/* initial idle draw before game start */
resetEntities();
draw();
</script>

</body>
</html>
